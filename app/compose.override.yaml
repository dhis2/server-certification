services:
  dhis2-cert-db:
    restart: "no"
    ports:
      - "5432:5432"

  dhis2-cert-redis:
    restart: "no"
    ports:
      - "6379:6379"

  dhis2-cert-migrations:
    image: dhis2-cert-api:dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dhis2-cert-migrations
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_HOST: dhis2-cert-db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
      RUN_SEEDS: ${RUN_SEEDS:-true}
    depends_on:
      dhis2-cert-db:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - dhis2-cert-api
    command: >
      sh -c "
        if [ \"\$SKIP_MIGRATIONS\" = \"true\" ]; then
          echo 'Skipping migrations (SKIP_MIGRATIONS=true)';
        else
          echo 'Running migrations...' &&
          if npm run migration:run; then
            echo 'Migrations completed successfully';
          else
            echo 'Migration failed!' && exit 1;
          fi
        fi &&
        if [ \"\$RUN_SEEDS\" = \"true\" ]; then
          echo 'Running seeds...' &&
          npm run seed;
        else
          echo 'Skipping seeds (RUN_SEEDS=false)';
        fi
      "
    restart: "no"

  dhis2-cert-api:
    image: dhis2-cert-api:dev
    restart: "no"
    ports:
      - "${PORT}:${PORT}"
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dhis2-cert-api
    command: npm run start:debug
    depends_on:
      dhis2-cert-db:
        condition: service_healthy
      dhis2-cert-redis:
        condition: service_healthy
      dhis2-cert-migrations:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      DB_HOST: dhis2-cert-db
      REDIS_HOST: dhis2-cert-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - dhis2-cert-api
    labels: []

  dhis2-cert-client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: dhis2-cert-client
    restart: "no"
    depends_on:
      - dhis2-cert-api
    environment:
      VITE_API_URL: http://localhost:${PORT:-3001}/api/v1
    ports:
      - "3000:3000"
      - "24678:24678"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - dhis2-cert-api

networks:
  traefik-public:
    external: false
    name: traefik-public
  dhis2-cert-api:
    internal: false
    name: dhis2-cert-api
